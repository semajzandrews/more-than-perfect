<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="6" fill="#17100a"/>
  <!-- brass caps -->
  <rect x="11" y="4"  width="10" height="3" rx="1.2" fill="#d29a3f"/>
  <rect x="11" y="25" width="10" height="3" rx="1.2" fill="#d29a3f"/>
  <!-- glass cylinder with diagonal barber stripes -->
  <clipPath id="g"><rect x="12" y="8" width="8" height="16" rx="4"/></clipPath>
  <g clip-path="url(#g)">
    <rect x="12" y="8" width="8" height="16" fill="#f4ead7"/>
    <g fill="#b3402f">
      <rect x="8" y="6"  width="20" height="3" transform="rotate(38 16 16)"/>
      <rect x="8" y="12" width="20" height="3" transform="rotate(38 16 16)"/>
      <rect x="8" y="18" width="20" height="3" transform="rotate(38 16 16)"/>
      <rect x="8" y="24" width="20" height="3" transform="rotate(38 16 16)"/>
    </g>
  </g>
</svg>
